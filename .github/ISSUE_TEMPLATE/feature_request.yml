name: ✨ Feature Request
description: Suggest a new feature or enhancement for URL Vault.
labels: [enhancement]
body:
  - type: textarea
    id: feature-relation
    attributes:
      label: Is your feature request related to a problem?
      description: A clear and concise description of what the problem is.
      placeholder: E.g., I'm always frustrated when I cannot export my links...
    validations:
      required: false
  - type: textarea
    id: describe-solution
    attributes:
      label: Describe the solution you'd like
      description: A clear and concise description of what you want to happen.
      placeholder: E.g., I would like a button in the settings panel to download all links as a JSON file.
    validations:
      required: true
  - type: textarea
    id: describe-alternatives
    attributes:
      label: Describe alternatives you've considered
      description: A clear and concise description of any alternative solutions or features you've considered.
    validations:
      required: false
  - type: textarea
    id: additional-context
    attributes:
      label: Additional Context
      description: Add any other context, mockup designs, or screenshots about the feature request here.
